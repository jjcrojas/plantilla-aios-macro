server.port=8084

aios.insumos-dir=C:\\Users\\jcrojas\\OneDrive - Superfinanciera\\Pensiones\\InformesDelegatura\\FORMATOS ACTUALIZADOS
aios.plantilla-dir=./plantillas
aios.salidas-referencia-dir=./salidas_referencia
aios.max-poi-file-mb=40
aios.macro-recalc-491-493=true

spring.datasource.url=jdbc:h2:mem:aios;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

logging.level.root=INFO
logging.level.AIOS_CELDAS=INFO

# Evita que DevTools escanee recursivamente la ruta base de insumos (OneDrive),
# lo que puede causar OutOfMemoryError en el File Watcher.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
